<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FootballIQ - Anteprima PC e mobile</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        padding: 22px;
        background:
          radial-gradient(circle at 12% 8%, rgba(55, 208, 127, 0.16), transparent 30%),
          radial-gradient(circle at 86% 6%, rgba(102, 168, 255, 0.18), transparent 28%),
          #05070c;
        color: #f3f7f5;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .showcase {
        width: min(1480px, 100%);
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(340px, 390px);
        gap: 18px;
        align-items: start;
      }

      .preview-panel {
        min-width: 0;
        display: grid;
        gap: 10px;
      }

      .preview-title {
        margin: 0;
        color: #f3c34f;
        font-size: 0.78rem;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .desktop-frame,
      .phone-frame {
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: linear-gradient(145deg, #101722, #05070c);
        box-shadow: 0 26px 70px rgba(0, 0, 0, 0.44);
      }

      .desktop-frame {
        width: 100%;
        height: min(780px, calc(100vh - 84px));
        min-height: 620px;
        padding: 10px;
        border-radius: 14px;
      }

      .phone-frame {
        width: min(390px, 100%);
        aspect-ratio: 390 / 844;
        padding: 12px;
        border-radius: 32px;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: #05070c;
      }

      .desktop-frame iframe {
        border-radius: 8px;
      }

      .phone-frame iframe {
        border-radius: 24px;
      }

      @media (max-width: 980px) {
        .showcase {
          grid-template-columns: 1fr;
        }

        .phone-panel {
          justify-items: center;
        }
      }
    </style>
  </head>
  <body>
    <main class="showcase">
      <section class="preview-panel">
        <p class="preview-title">FootballIQ PC</p>
        <div class="desktop-frame">
          <iframe src="./index.html" title="FootballIQ versione PC"></iframe>
        </div>
      </section>
      <section class="preview-panel phone-panel">
        <p class="preview-title">FootballIQ app mobile</p>
        <div class="phone-frame">
          <iframe src="./index.html" title="FootballIQ versione mobile"></iframe>
        </div>
      </section>
    </main>
  </body>
</html>
