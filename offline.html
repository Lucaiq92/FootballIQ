<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#05070c" />
    <title>FootballÍQ - Offline</title>
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #05070c;
        --surface: #101722;
        --ink: #f3f7f5;
        --muted: #a7b5b0;
        --green: #37d07f;
        --gold: #f1c45d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: max(24px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right))
          max(24px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
        background:
          radial-gradient(circle at 15% 0%, rgba(55, 208, 127, 0.18), transparent 32%),
          linear-gradient(180deg, #070b12 0%, var(--bg) 70%);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(420px, 100%);
        padding: 24px;
        border: 1px solid rgba(55, 208, 127, 0.24);
        border-radius: 12px;
        background: rgba(16, 23, 34, 0.92);
        box-shadow: 0 22px 48px rgba(0, 0, 0, 0.38);
      }

      img {
        width: 84px;
        height: 84px;
        border-radius: 22px;
      }

      p:first-of-type {
        margin: 18px 0 6px;
        color: var(--gold);
        font-size: 0.74rem;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.2rem, 14vw, 4rem);
        line-height: 0.95;
      }

      p:last-of-type {
        margin: 16px 0 0;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="assets/icons/icon-192.png" alt="" />
      <p>Modalita offline</p>
      <h1>FootballÍQ</h1>
      <p>La base dell'app e' salvata. Riapri quando torna la connessione per aggiornare foto e dati esterni.</p>
    </main>
  </body>
</html>
