<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FootballIQ - Anteprima mobile</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 18% 10%, rgba(55, 208, 127, 0.16), transparent 30%),
          radial-gradient(circle at 78% 4%, rgba(102, 168, 255, 0.18), transparent 28%),
          #05070c;
        color: #f3f7f5;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .preview-wrap {
        display: grid;
        gap: 14px;
        justify-items: center;
      }

      .preview-title {
        margin: 0;
        color: #f3c34f;
        font-size: 0.82rem;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .phone-frame {
        width: min(390px, calc(100vw - 32px));
        aspect-ratio: 390 / 844;
        padding: 12px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 32px;
        background: linear-gradient(145deg, #101722, #05070c);
        box-shadow: 0 26px 70px rgba(0, 0, 0, 0.5);
      }

      .phone-screen {
        width: 100%;
        height: 100%;
        border: 0;
        border-radius: 24px;
        background: #05070c;
      }
    </style>
  </head>
  <body>
    <main class="preview-wrap">
      <p class="preview-title">FootballIQ mobile app</p>
      <div class="phone-frame">
        <iframe class="phone-screen" src="./index.html" title="Anteprima mobile FootballIQ"></iframe>
      </div>
    </main>
  </body>
</html>
